version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: whatsapp_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  whatsapp-api:
    build: .
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://admin:secret@postgres:5432/whatsapp_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_jwt_secret_change_me
      STRIPE_SECRET_KEY: sk_test_xxx
      STRIPE_PRICE_BASIC: price_basic_xxx
      STRIPE_PRICE_PRO: price_pro_xxx
      STRIPE_PRICE_ENTERPRISE: price_ent_xxx
      ADMIN_EMAIL: admin@example.com
    depends_on:
      - postgres
      - redis
    volumes:
      - ./sessions:/app/sessions

volumes:
  pgdata:
